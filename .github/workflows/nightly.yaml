name: Nightly

on:
  # Disable for the starter template
  # schedule:
  #   - cron: "37 6 * * *"
  workflow_dispatch:

env:
  # renovate: datasource=github-releases depName=jdx/mise
  MISE_VERSION: 2026.6.11

permissions:
  contents: read

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.check.outputs.has-changes }}
      latest-nightly: ${{ steps.check.outputs.latest-nightly }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for changes
        id: check
        run: |
          LATEST_NIGHTLY=$(git describe --tags --match 'nightly-*' --abbrev=0 2>/dev/null || echo "")
          echo "latest-nightly=${LATEST_NIGHTLY}" >> $GITHUB_OUTPUT

          if [ -z "$LATEST_NIGHTLY" ]; then
            echo "No previous nightly release found, proceeding with build"
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            COMMITS=$(git rev-list "$LATEST_NIGHTLY..HEAD" --count)
            if [ "$COMMITS" -gt 0 ]; then
              echo "Found $COMMITS commits since last nightly release ($LATEST_NIGHTLY)"
              echo "has-changes=true" >> $GITHUB_OUTPUT
            else
              echo "No new commits since last nightly release ($LATEST_NIGHTLY)"
              echo "has-changes=false" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: check-changes
    if: needs.check-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      attestations: write # needed to persist artifact attestations
      artifact-metadata: write # needed to create artifact metadata records
      contents: read
      id-token: write # needed to mint the OIDC token for signing attestations
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: ${{ env.MISE_VERSION }}

      - name: Build all platforms
        run: just build-all

      - name: Compress binaries
        run: |
          cd build
          for binary in yt-dlp-mcp-*; do
            tar -cvzf "${binary}.tar.gz" "$binary"
          done

      - name: Generate checksums
        run: |
          cd build
          sha256sum *.tar.gz > SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: build/SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries
          path: |
            build/*.tar.gz
            build/SHA256SUMS

  release:
    needs: [check-changes, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries
          path: build

      - name: Delete old nightly release
        run: |
          if [ -n "$LATEST_NIGHTLY" ]; then
            echo "Deleting old nightly release: $LATEST_NIGHTLY"

            RELEASE_ID=$(gh api "repos/:owner/:repo/releases/tags/$LATEST_NIGHTLY" --jq '.id')

            if [ -n "$RELEASE_ID" ]; then
              gh api -X DELETE "repos/:owner/:repo/releases/$RELEASE_ID"
            fi

            gh api -X DELETE "repos/:owner/:repo/git/refs/tags/$LATEST_NIGHTLY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LATEST_NIGHTLY: ${{ needs.check-changes.outputs.latest-nightly }}

      - name: Create nightly release
        run: |
          TAG="nightly-$(date -u +%Y-%m-%d-%H-%M-%S)"
          TITLE="Nightly Build - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "Automated nightly build. Release assets include SHA256SUMS and GitHub artifact attestations." \
            build/*.tar.gz \
            build/SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
