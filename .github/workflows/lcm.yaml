name: LCM

on:
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lcm:
    name: LCM
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # needed to approve the PR
    if: |
      github.event.pull_request.user.login == 'renovate[bot]' &&
      github.repository == 'acidghost/yt-dlp-mcp' &&
      contains(github.event.pull_request.labels.*.name, 'lcm/approve')
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
